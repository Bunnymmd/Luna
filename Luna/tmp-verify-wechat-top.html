<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verify WeChat Top</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, #efe8f2 0%, #d9daf3 100%);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .preview-phone {
      width: 430px;
      height: 932px;
      overflow: hidden;
      border-radius: 32px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.18);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.12));
    }

    .preview-cellular {
      width: 18px;
      height: 12px;
    }

    .preview-battery {
      width: 22px;
      height: 12px;
    }

    .preview-filler {
      height: 700px;
      background:
        radial-gradient(circle at 18% 10%, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0) 18%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0));
    }
  </style>
</head>
<body>
  <div class="preview-phone">
    <div class="wechat-thread-detail">
      <div class="wechat-thread-detail__header">
        <div class="wechat-thread-detail__header-main">
          <div class="wechat-thread-detail__status-bar">
            <span class="wechat-thread-detail__status-time">03:10</span>
            <div class="wechat-thread-detail__status-meta">
              <svg class="preview-cellular wechat-thread-detail__status-icon" viewBox="0 0 18 12" fill="none" aria-hidden="true">
                <rect x="1" y="8" width="2" height="3" rx="1" fill="currentColor"></rect>
                <rect x="5" y="6" width="2" height="5" rx="1" fill="currentColor"></rect>
                <rect x="9" y="4" width="2" height="7" rx="1" fill="currentColor"></rect>
                <rect x="13" y="1" width="2" height="10" rx="1" fill="currentColor"></rect>
              </svg>
              <span>4G</span>
              <svg class="preview-battery wechat-thread-detail__status-icon" viewBox="0 0 22 12" fill="none" aria-hidden="true">
                <rect x="1" y="1.5" width="18" height="9" rx="2.5" stroke="currentColor" stroke-width="1.2"></rect>
                <rect x="3.2" y="3.1" width="11.6" height="5.8" rx="1.4" fill="#26c95d"></rect>
                <rect x="19.4" y="4.1" width="1.8" height="3.8" rx="0.9" fill="currentColor"></rect>
              </svg>
            </div>
          </div>

          <div class="wechat-thread-detail__window-bar">
            <div class="wechat-thread-detail__window-left">
              <button type="button" class="wechat-thread-detail__window-back">
                <span class="wechat-thread-detail__window-back-label">INVITION</span>
                <span class="wechat-thread-detail__window-back-dot"></span>
              </button>
              <button type="button" class="wechat-thread-detail__header-chip">Forum</button>
              <button type="button" class="wechat-thread-detail__window-plus">+</button>
            </div>
          </div>

          <div class="wechat-thread-detail__header-title-row">
            <button type="button" class="wechat-thread-detail__header-link" aria-label="链接">
              <span class="wechat-thread-detail__header-link-mark"></span>
            </button>
            <div class="wechat-thread-detail__header-title-wrap">
              <div class="wechat-thread-detail__header-title">秀秀</div>
              <span class="wechat-thread-detail__header-grid" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
              </span>
            </div>
            <button type="button" class="wechat-thread-detail__header-send" aria-hidden="true"></button>
          </div>
        </div>
      </div>

      <div class="preview-filler"></div>
    </div>
  </div>
</body>
</html>
